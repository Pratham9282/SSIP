<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & GPS Attendance System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AI & GPS Attendance System</h1>
    </header>

    <main>
        <div class="container">
            <!-- Face Recognition Section -->
            <div class="section">
                <h2>Face Recognition</h2>
                <video id="video" autoplay></video>
                <button id="capture">Capture Face</button>
                <canvas id="canvas"></canvas>
                <p id="face-status">Status: Waiting for face detection...</p>
            </div>

            <!-- Attendance Form Section -->
            <div class="section">
                <h2>Attendance Form</h2>
                <form id="attendanceForm">
                    <label for="name">Name:</label>
                    <input type="text" id="name" placeholder="Enter your name" required>

                    <label for="date">Date:</label>
                    <input type="date" id="date" required>

                    <label for="location">Location:</label>
                    <input type="text" id="location" readonly>

                    <button type="submit">Submit Attendance</button>
                </form>
                <p id="location-status">Status: Finding location...</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 AI Attendance System</p>
    </footer>

    <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
    <script src="script.js"></script>
</body>
</html>
